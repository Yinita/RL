# GRPO Configuration for Nemotron Reasoning Challenge
# Using Nemotron-3-Nano-30B with LoRA (max rank 32)

grpo:
  num_prompts_per_step: 64
  num_generations_per_prompt: 16
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 1000
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 5
  val_at_start: true
  val_at_end: true
  overlong_filtering: false
  max_val_samples: 512
  val_batch_size: 64
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  reward_shaping:
    enabled: true  # Enable token compression reward
    overlong_buffer_length: 128
    overlong_buffer_penalty: 0.1  # Mild penalty for overlong responses
    max_response_length: 7680  # Target length (competition requirement)
    stop_properly_penalty_coef: null
    # Token compression parameters
    token_compression:
      enabled: true
      target_length: 7680  # Competition target
      compression_weight: 0.05  # Low weight to minimize impact on accuracy
      compression_type: "linear"  # Linear penalty for excess tokens

  adv_estimator:
    name: "grpo"
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  seq_logprob_error_threshold: null

  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false

loss_fn:
  reference_policy_kl_penalty: 0.01
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: false
  truncated_importance_sampling_ratio: null
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false
  use_kl_in_reward: false

checkpointing:
  enabled: true
  checkpoint_dir: "results/nemo_reasoning_rl"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 3
  save_period: 5
  checkpoint_must_save_by: null
  model_save_format: "safetensors"
  save_consolidated: false
  save_optimizer: true

policy:
  # Use Nemotron-3-Nano-30B base model
  model_name: "nvidia/Nemotron-3-Nano-30B-A3B-FP8"
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: 1024
  train_micro_batch_size: 8
  generation_batch_size: 64
  logprob_batch_size: ${policy.train_micro_batch_size}
  max_total_sequence_length: 24576  # Increased for training (20000 + prompt)
  precision: "bfloat16"
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: true
    cpu_offload: False
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 4
    context_parallel_size: 1
    custom_parallel_plan: null
    automodel_kwargs: {}

    # LoRA Configuration (max rank 32 as required by competition)
    lora_cfg:
      enabled: True
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 32  # Max rank 32
      alpha: 64  # alpha = 2 * dim
      dropout: 0.05
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: false
    force_reconvert_from_hf: False
    empty_unused_memory_level: 1
    activation_checkpointing: false
    converter_type: "NemotronForCausalLM"
    tensor_model_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: true
    apply_rope_fusion: True
    bias_activation_fusion: True
    defer_fp32_logits: False
    moe_per_layer_logging: False
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_shared_expert_overlap: false
    gradient_accumulation_fusion: false

    peft:
      enabled: false
      target_modules: []
      exclude_modules: []
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init_method: "xavier"
      lora_B_init_method: "zero"
      a2a_experimental: false
      lora_dtype: None

    optimizer:
      optimizer: "adam"
      lr: 5.0e-6
      min_lr: 5.0e-7
      weight_decay: 0.01
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 13
      lr_warmup_init: 5.0e-7
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"
    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false
    env_vars: null

  draft:
    enabled: false
    model_name: null
    loss_weight: 0.1
    num_layers: null
    aux_layer_indices: null

  dynamic_batching:
    enabled: False
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: True
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
  max_grad_norm: 1.0

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 5.0e-6
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1e-8
      foreach: False
      fused: False

  scheduler:
    - name: "torch.optim.lr_scheduler.LinearLR"
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 50
    - name: "torch.optim.lr_scheduler.ConstantLR"
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: [50]

  generation:
    backend: "vllm"
    max_new_tokens: 20000  # Training: allow longer generation for exploration
    temperature: 1.0  # Training: higher temperature for diversity
    top_p: 0.9  # Training: nucleus sampling for exploration
    top_k: null
    stop_token_ids: null
    stop_strings: null
    mcore_generation_config:
      buffer_size_gb: 10
      num_cuda_graphs: 4
      block_size_tokens: 256
      use_cuda_graphs_for_non_decode_steps: true
      enable_chunked_prefill: true
      unified_memory_level: 0
      max_tokens: 24576  # Increased for training
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 4
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.85  # Competition requirement
      max_model_len: 24576  # Increased for training (20000 + prompt)
      enforce_eager: False
      use_deep_gemm: False
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
    vllm_kwargs: {}
    colocated:
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  shuffle: true
  num_workers: 4
  use_multiple_dataloader: false

  train:
    dataset_name: NemotronReasoningDataset
    data_path: "c:/Users/06/Desktop/codes/nemo/data/final_Nemotron_training_data.csv"
    split_validation_size: 0.1  # 10% for validation
    seed: ${grpo.seed}
  validation: null
  default:
    prompt_file: "nemo_reasoning/prompts/default.txt"
    system_prompt_file: null
    processor: "nemo_reasoning_hf_data_processor"
    env_name: "nemo_reasoning"

env:
  nemo_reasoning:
    num_workers: 8
    reward_fn: "nemo_reasoning_reward_fn"
    # Token compression configuration
    token_compression:
      enabled: true
      target_length: 7680
      compression_weight: 0.05
      min_accuracy_threshold: 0.8  # Don't penalize if accuracy is above this

logger:
  log_dir: "logs/nemo_reasoning_rl"
  num_val_samples_to_print: 5
  wandb_enabled: true
  tensorboard_enabled: true
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "nemo-rl-0420"
    name: "nemotron-reasoning-grpo"
  swanlab:
    project: "nemo-rl-0420"
    name: "nemotron-reasoning-grpo"
  tensorboard: {}
  mlflow:
    experiment_name: "nemotron-reasoning"
    run_name: "grpo"
    tracking_uri: "http://localhost:5000"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 1
